name: tomoannotator
# CPU-only environment — use this on laptops/machines without an NVIDIA GPU.
# Painting, patch extraction, evaluation and detection all run fine on CPU;
# only training is slow without a GPU (use Garibaldi or EC2 for that).
channels:
  - pytorch
  - conda-forge
  - nodefaults          # do NOT use the anaconda 'defaults' channel
dependencies:
  - python=3.10
  - pip
  - pytorch>=2.1
  - torchvision
  - cpuonly             # forces the CPU build of PyTorch
  - scikit-learn
  - pandas
  - numpy
  - matplotlib
  - scipy
  - jupyter
  - pip:
    - mrcfile
    - pynrrd
    - cryoet-data-portal
    - trimesh
    - pyyaml
    - tqdm
    - boto3
