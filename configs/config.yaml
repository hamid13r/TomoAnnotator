# Unified config for the tomogram feature detection pipeline

features:
  # Each entry becomes a class. Order matters — IDs are 1-indexed.
  # 0 is always background (unpainted regions).
  - name: mitochondria
    color: [255, 140, 0]    # orange
  - name: er
    color: [0, 191, 255]    # cyan
  - name: microtubules
    color: [50, 205, 50]    # green
  - name: vesicles
    color: [238, 130, 238]  # violet
  - name: ribosomes
    color: [255, 215, 0]    # gold
  - name: nuclear_envelope
    color: [255, 99, 71]    # tomato
  - name: filaments
    color: [255, 0, 255]
  - name: granules
    color: [70, 130, 180]    # steel blue
  - name: junk_frost
    color: [128, 128, 128]   # gray — ice contamination / frost / junk to reject

preprocess:
  # Rescaling is applied FIRST, to bring tomograms onto a common voxel size.
  rescale:
    enabled: true
    output_pixel_size: 20.0   # target voxel size in Angstroms (common scale for all runs)
    input_pixel_size: null    # null = read from MRC/NRRD header; set a number to override
    order: 1                  # interpolation order for resampling (0=nearest, 1=linear, 3=cubic)
  # Low-pass filtering is applied to the (rescaled) volume BEFORE normalization.
  clip_percentile: [5, 95]  # intensity clip percentiles used during normalization
  lowpass:
    enabled: true
    method: gaussian        # "gaussian" or "fourier"
    # --- gaussian method ---
    sigma: 1.5              # Gaussian blur sigma in voxels (larger = smoother)
    # --- fourier method (Butterworth low-pass) ---
    cutoff: 0.25            # cutoff as a fraction of Nyquist (0-1)
    order: 2               # Butterworth order (sharpness of the cutoff)

model:
  # How patches are shaped and which CNN is trained:
  #   3d    — cubic patches (patches.size^3), 3D CNN. Full volumetric context.
  #   2d    — single in-plane square patches (box_2d^2), 2D CNN. Most sample-efficient.
  #   2.5d  — a stack of n_slices adjacent Z-slices (box_2d^2 each) as input
  #           channels to a 2D CNN. In-plane context + a little Z, avoids the
  #           worst of the cryoET missing-wedge along Z. Recommended default.
  #   slice — whole-slice classification. You paint/fill entire Z-slices with one
  #           class; each painted slice (resized to slice_box) is one 2D training
  #           sample. Best for screening presence/absence, incl. junk/frost.
  type: 2.5d                # 2d | 2.5d | 3d | slice
  box_2d: 96                # in-plane patch size (voxels) for 2d / 2.5d
  n_slices: 5               # adjacent Z slices stacked as channels for 2.5d (use 1 for 2d)
  slice_box: 256            # full slices are resized to slice_box × slice_box for "slice" mode

patches:
  size: 48                  # cubic patch size in voxels (3d mode only)
  per_class: 300            # patches to extract per feature class per tomogram
  background_ratio: 1.5     # background patches = per_class × ratio
  # "slice" mode only: a Z-slice is assigned a feature class if at least this
  # fraction of its painted voxels belong to that class; otherwise, if the slice
  # has essentially no paint it becomes a background sample.
  slice_label_fraction: 0.5
  background_slice_ratio: 1.0  # background slices kept = (#feature slices) × ratio

training:
  batch_size: 32
  epochs: 50
  lr: 1.0e-3
  weight_decay: 1.0e-4
  val_fraction: 0.15        # fraction of patches held out for validation

detection:
  stride_fraction: 0.5      # sliding window stride = patch_size × stride_fraction
  confidence_threshold: 0.6 # min confidence to flag a feature as present
  min_patches_detected: 3   # min patches above threshold to call feature present
  # "slice" mode: every Z-slice is classified whole; a feature is called present
  # if at least this many slices exceed confidence_threshold.
  min_slices_detected: 2

aws:
  bucket: scrippsresearch-tomoannotator
  region: us-west-2
  profile: null             # null = use EC2 instance profile; set to your SSO profile on laptop
